name: Security Scan

# 📋 Purpose
# Scan codebase for secrets and credentials using Gitleaks and TruffleHog
# Runs on every PR and push to main to catch leaked secrets early

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
# 🔄 Concurrency Control
# Cancel outdated workflow runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: 🔐 Gitleaks Secret Scanning
    runs-on: ubuntu-latest
    steps:
      # 0️⃣ Checkout source code with full history for secret scanning
      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Need full history to scan all commits

      # 1️⃣ Run Gitleaks to detect secrets in git history
      - name: 🔍 Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    name: 🐷 TruffleHog Secret Scanning
    runs-on: ubuntu-latest
    steps:
      # 0️⃣ Checkout source code with full history
      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Need full history for differential scanning

      # 1️⃣ Run TruffleHog to detect verified secrets
      - name: 🔍 Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.91.1
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified # Only flag verified secrets

  # 🚀 CI/CD OPTIMIZATION: Trivy filesystem scans (NO Docker build required!)
  # This replaces slow Docker builds on PRs while maintaining security coverage
  trivy-backend:
    name: 🔍 Trivy - Backend Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🔍 Scan Python dependencies (pyproject.toml, poetry.lock)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 pinned to SHA
        with:
          scan-type: "fs"
          scan-ref: "backend/"
          format: "sarif"
          output: "trivy-backend-deps.sarif"
          severity: "CRITICAL,HIGH"
          scanners: "vuln" # Only vulnerabilities, not misconfigurations

      - name: 📤 Upload Trivy Backend SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backend-deps.sarif
          category: trivy-backend-deps

  trivy-frontend:
    name: 🔍 Trivy - Frontend Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🔍 Scan Node dependencies (package.json, package-lock.json)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 pinned to SHA
        with:
          scan-type: "fs"
          scan-ref: "frontend/"
          format: "sarif"
          output: "trivy-frontend-deps.sarif"
          severity: "CRITICAL,HIGH"
          scanners: "vuln"

      - name: 📤 Upload Trivy Frontend SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-frontend-deps.sarif
          category: trivy-frontend-deps
